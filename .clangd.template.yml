# ============================================================================
#             *****DO NOT EDIT THIS TEMPLATE FILE MANUALLY*****
# All configurations must be applied via external JSON or script generation.
# ----------------------------------------------------------------------------
#
# .clangd Configuration File for StratOS Project
# 
# This file configures the clangd language server for the StratOS RTOS project.
# It provides compile flags, include paths, macro definitions, and diagnostic
# suppressions to enable accurate code analysis, completion, and navigation
# for the embedded C++17 codebase.
#
# The configuration is designed to be used with a CMake-generated compilation
# database (build/compile_commands.json) and supports both C and C++ files.
# Place this file in the project root directory.
#
# Note: Paths and macros containing {placeholders} must be replaced with
# actual values (e.g., {your_compiler_path}, {project_root}) before use.
# 
# ============================================================================

# ----------------------------------------------------------------------------
# Compilation Flags
# ----------------------------------------------------------------------------
CompileFlags:
  # Directory containing compile_commands.json (generated by CMake)
  CompilationDatabase: build

  # Path to the g++ compiler executable (e.g., arm-none-eabi-g++).
  Compiler: {your_compiler_path}

  # Instruct clangd to query the driver for built-in include paths.
  BuiltinHeaders: QueryDriver

  # Additional flags to be added to the compilation command.
  Add: 
    # Toolchain path for GCC root.
    - --gcc-toolchain={your_toolchain_path}

    # Project-specific preprocessor definitions.
    {project_definitions}

    # C++ preprocessor definitions.
    - -DNO_RTTI
    - -D__CPLUSPLUS
    - -DNO_EXCEPTIONS
    - -D__cplusplus=201709L

    # Force-include the STM32F10x CMSIS header.
    - -include
    - {project_root}/libraries/stm32SL/Libraries/CMSIS/CM3/DeviceSupport/ST/STM32F10x/stm32f10x.h

    # Include paths for libraries and project sources.
    - -I
    - {project_root}/libraries/MUSSTL/install/include
    - -I
    - {project_root}/libraries/STM32F10x_StdPeriph_Driver/inc
    - -I
    - {project_root}/libraries/stm32SL/Libraries/CMSIS/CM3/DeviceSupport/ST/STM32F10x
    - -I
    - {project_root}/libraries/stm32SL/Libraries/CMSIS/CM3/CoreSupport
    - -I
    - {project_root}/libraries/stm32SL/Libraries
    - -I
    - {project_root}

    # Simulated G++ predefines (use placeholders; replace with actual values).
    # These macros mimic the behavior of the ARM GCC toolchain.
    {g++_predefines}

  # Flags to be removed from the compilation command.
  Remove:
    - -fno-weak          # Remove this flag to avoid conflicts.
    - -std=c++17         # We will add it conditionally for C++ files.
    - -Wl,*              # Remove linker-specific flags.

# ----------------------------------------------------------------------------
# Per-File Language Standard
# ----------------------------------------------------------------------------
# For C++ source and header files, add the C++17 standard flag.
If:
  PathMatch: [".*\\.cpp$", ".*\\.hpp$", ".*\\.cxx$", ".*\\.cc$"]
CompileFlags:
  Add: [-std=c++17]

# ----------------------------------------------------------------------------
# Diagnostics Suppression
# ----------------------------------------------------------------------------
# Suppress certain warnings that are not relevant or are known issues
# with the embedded toolchain and inline assembly.
Diagnostics:
  Suppress:
    - "unknown-argument"                     # Ignore unknown compiler arguments.
    - "drv_argument_not_allowed_with"        # Driver argument compatibility.
    - "asm_naked_parm_ref"                   # References to parameters in naked functions.
    - "non_asm_stmt_in_naked_function"       # Non-assembly statements in naked functions.
    - "embedded_include_in_asm"              # Includes inside inline assembly.
    - "expected_string_literal_in_asm"       # Non-string literals in asm statements.

# ----------------------------------------------------------------------------
# Documentation Generation
# ----------------------------------------------------------------------------
# Use Doxygen format for generating documentation comments.
Documentation:
  CommentFormat: Doxygen